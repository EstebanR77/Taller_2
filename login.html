<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="./logos/favicon.svg">
    <title>Login - Globalgró</title>
</head>
<body>
    <div class="login">
        <div class="form-container">
            <img src="./logos/logo_yard_sale.svg" alt="logo" class="logo">
            <form action="/" class="form">
                <label for="email" class="label">Email address</label>
                <input type="text" id="email" placeholder="email@uniboyaca.edu.co" class="input">
                <label for="password" class="label">Password</label>
                <input type="password" id="password" placeholder="*********" class="input">
                <input type="button" value="Log in" class="primary-button login-button" onclick="location.href='components/main.html'">
                <a href="password.html">Forgot my password</a>
            </form>
            <button class="secondary-button" onclick="location.href='signup.html'">Sign up</button>
        </div>
    </div>
</body>
</html>
